<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submit - Great Park Explorations</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Fixes the invisible text in the dropdown */
select option {
    background-color: #1a1a1a; /* Dark background for the menu */
    color: #eee;               /* Light text color */
}

/* Optional: Improves the look of the select box itself */
select {
    appearance: none;          /* Removes default browser styling */
    -webkit-appearance: none;
    background-color: rgba(255, 255, 255, 0.05);
    cursor: pointer;
}
    select:hover {
    border-color: var(--accent);
    box-shadow: 0 0 10px rgba(255, 77, 77, 0.2);
}
    :root { --accent: #ff4d4d; --glass: rgba(0, 0, 0, 0.75); --border: rgba(255, 255, 255, 0.1); }
    body { background-color: #0a0a0a; color: #eee; font-family: 'Roboto', sans-serif; margin: 0; }
    .submit-card { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 15px; padding: 40px; margin: 40px auto; max-width: 600px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
    h2 { font-family: monospace; text-transform: uppercase; letter-spacing: 3px; color: var(--accent); text-align: center; }
    .input-group { margin-bottom: 20px; display: flex; flex-direction: column; }
    label { font-family: monospace; font-size: 0.8rem; margin-bottom: 8px; color: #888; text-transform: uppercase; }
    input, textarea, select { background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 12px; color: #fff; border-radius: 5px; }
    .hidden { display: none; }
    .submit-btn { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; letter-spacing: 2px; }
    .submit-btn:disabled { background: #444; cursor: not-allowed; }
    .status-msg { text-align: center; margin-top: 15px; font-family: monospace; }
    .warning { font-size: 0.75rem; color: #666; text-align: center; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-content">
      <h1 data-text="Great Park Explorations">Great Park Explorations</h1>
      <nav>
        <a href="index.html">Home</a>
        <a href="map.html">Map</a>
        <a href="stories.html">Stories</a>
        <a href="submit.html">Submit</a>
      </nav>
    </div>
  </div>

  <main style="padding: 20px;">
    <section class="submit-card">
      <h2>Transmission</h2>
      <div class="input-group">
        <label>Classification</label>
        <select id="subType" onchange="updateForm()">
          <option value="">-- SELECT TYPE --</option>
          <option value="story">ENCOUNTER / STORY</option>
          <option value="location">NEW COORDINATES</option>
        </select>
      </div>

      <form id="mainForm">
        <div id="storyFields" class="hidden">
          <div class="input-group"><label>The Encounter</label><textarea id="s_content" rows="6"></textarea></div>
          <div class="input-group"><label>General Area</label><input type="text" id="s_loc"></div>
          <div class="input-group"><label>Contact/Phone</label><input type="tel" id="s_phone"></div>
        </div>
        <div id="locFields" class="hidden">
          <div class="input-group"><label>Location Name</label><input type="text" id="l_title"></div>
          <div class="input-group"><label>Why is it unsettling?</label><textarea id="l_desc" rows="4"></textarea></div>
        </div>
        <button type="button" id="sendBtn" class="submit-btn" onclick="submitToDiscord()">INITIATE UPLOAD</button>
        <div id="status" class="status-msg"></div>
        <p class="warning">IP LOGGING ACTIVE. UNAUTHORIZED ACCESS PROHIBITED.</p>
      </form>
    </section>
  </main>

  <script>
    // --- GPE SECURE CONFIG ---
    function getGPEStream() {
        // This is your webhook split into parts to prevent bot scraping
        const protocol = "https://";
        const domain = "discord.com";
        const path = "/api/webhooks/1487844478629970154/";
        const secret = "RtESZy5iyccydrTg5UDOklEqk2j88Q_mivM92aeeMBbUBVQjeLkBnbfzdE4SichsQ_P0";
        return protocol + domain + path + secret;
    }

    function updateForm() {
        const t = document.getElementById('subType').value;
        document.getElementById('storyFields').classList.toggle('hidden', t !== 'story');
        document.getElementById('locFields').classList.toggle('hidden', t !== 'location');
    }

    async function submitToDiscord() {
        const type = document.getElementById('subType').value;
        const btn = document.getElementById('sendBtn');
        const status = document.getElementById('status');
        
        if (!type) { status.innerText = "Select classification."; return; }

        btn.disabled = true;
        status.innerText = "INITIATING UPLINK...";

        try {
            // 1. Get IP
            const ipRes = await fetch('https://api.ipify.org?format=json').then(r => r.json());
            const userIP = ipRes.ip;

            // 2. Build Payload
            let fields = [{ name: "UPLOADER IP", value: `\`${userIP}\`` }];
            
            if (type === 'story') {
                const content = document.getElementById('s_content').value;
                if(!content) throw "Empty Transmission";
                fields.push(
                    { name: "STORY", value: content },
                    { name: "AREA", value: document.getElementById('s_loc').value || "Unknown" }
                );
            } else {
                const title = document.getElementById('l_title').value;
                if(!title) throw "Empty Coordinates";
                fields.push(
                    { name: "LOC NAME", value: title },
                    { name: "UNSETTLING FACTOR", value: document.getElementById('l_desc').value || "None" }
                );
            }

            const payload = {
                username: "GPE Terminal",
                avatar_url: "https://i.imgur.com/R8M5S70.png",
                embeds: [{ 
                    title: `DATA PACKET: ${type.toUpperCase()}`, 
                    fields: fields, 
                    color: type === 'story' ? 15548997 : 3447003,
                    footer: { text: "GPE SECURE NETWORK" },
                    timestamp: new Date()
                }]
            };

            // 3. Send to Discord
            const response = await fetch(getGPEStream(), {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                status.innerHTML = "<span style='color:#00ff00'>TRANSMISSION SUCCESSFUL.</span>";
                document.getElementById('mainForm').reset();
                setTimeout(() => location.reload(), 2500);
            } else {
                throw "Uplink Rejected by Central Command";
            }

        } catch (err) {
            console.error("GPE Error:", err);
            status.innerHTML = `<span style='color:red'>ERROR: ${err}</span>`;
            btn.disabled = false;
            btn.innerText = "RETRY UPLOAD";
        }
    }
</script>
</body>
</html>
